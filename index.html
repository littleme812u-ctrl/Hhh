<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="投資組合">
<meta name="theme-color" content="#0a0e1a">
<title>投資組合</title>
<style>
:root {
  --bg:#0a0e1a; --bg2:#111827; --bg3:#1c2333; --card:#161d2e;
  --bdr:rgba(255,255,255,0.07); --acc:#00d4aa; --red:#f87171; --grn:#34d399;
  --tx:#f1f5f9; --tx2:#94a3b8; --tx3:#475569;
  --st:env(safe-area-inset-top); --sb:env(safe-area-inset-bottom); --th:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:-apple-system,Helvetica,sans-serif;}
/* topbar */
#topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding-top:calc(var(--st) + 12px);padding-bottom:12px;padding-left:18px;padding-right:18px;
  background:rgba(10,14,26,0.92);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;}
.ttl{font-size:18px;font-weight:700;}.ttl span{color:var(--acc);}
.tbtns{display:flex;gap:8px;}
.ibtn{width:34px;height:34px;border-radius:10px;background:var(--bg3);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}
/* tabbar */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:var(--sb);
  background:rgba(10,14,26,0.95);border-top:1px solid var(--bdr);display:flex;}
.tab{flex:1;height:var(--th);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;font-size:9px;color:var(--tx3);font-weight:600;}
.tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;}
.tab.on{color:var(--acc);}
/* pages */
#pages{position:fixed;inset:0;}
.page{position:absolute;inset:0;overflow-y:auto;
  padding-top:calc(var(--st) + 62px);
  padding-bottom:calc(var(--th) + var(--sb) + 10px);
  display:none;-webkit-overflow-scrolling:touch;}
.page.on{display:block;}
.pc{padding:12px 15px;}
/* hero */
.hero{background:linear-gradient(135deg,#0d1929,#1a2640);border-radius:18px;
  padding:20px;margin-bottom:12px;border:1px solid rgba(0,212,170,0.15);}
.hlbl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.hamt{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:3px;}
.htm{font-size:11px;color:var(--tx3);margin-bottom:12px;}
.hrow{display:flex;gap:7px;}
.hchip{flex:1;background:rgba(255,255,255,0.05);border-radius:9px;padding:7px 9px;}
.hchip .lbl{font-size:9px;color:var(--tx3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
.hchip .val{font-size:12px;font-weight:700;}
/* card */
.card{background:var(--card);border-radius:15px;border:1px solid var(--bdr);overflow:hidden;margin-bottom:11px;}
.sec{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin:14px 0 7px;}
/* row */
.row{display:flex;align-items:center;padding:11px 15px;border-bottom:1px solid var(--bdr);}
.row:last-child{border-bottom:none;}
.dot{width:8px;height:8px;border-radius:50%;margin-right:9px;flex-shrink:0;}
.bdg{font-size:9px;font-weight:800;padding:3px 6px;border-radius:5px;margin-right:9px;flex-shrink:0;}
.bdg.b{background:rgba(52,211,153,.15);color:var(--grn);}
.bdg.s{background:rgba(248,113,113,.15);color:var(--red);}
.pos{color:var(--grn);}.neg{color:var(--red);}
/* fab */
.fab{position:fixed;right:18px;bottom:calc(var(--th) + var(--sb) + 13px);
  width:48px;height:48px;border-radius:13px;background:var(--acc);color:#000;
  font-size:24px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,212,170,.4);cursor:pointer;border:none;z-index:50;}
/* overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;
  display:none;align-items:flex-end;}
.ov.on{display:flex;}
.sht{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:90vh;
  overflow-y:auto;padding:15px 17px calc(var(--sb) + 18px);
  -webkit-overflow-scrolling:touch;border:1px solid var(--bdr);}
.hdl{width:34px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px;}
.stl{font-size:17px;font-weight:800;margin-bottom:16px;}
/* form */
.fg{margin-bottom:11px;}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:5px;}
.inp,.sel{width:100%;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:11px;
  padding:11px 13px;font-size:15px;color:var(--tx);-webkit-appearance:none;outline:none;}
.inp:focus,.sel:focus{border-color:var(--acc);}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.seg{display:flex;background:var(--bg3);border-radius:11px;padding:3px;gap:2px;}
.sbt{flex:1;padding:8px;border-radius:9px;border:none;background:none;color:var(--tx2);
  font-size:13px;font-weight:700;cursor:pointer;}
.sbt.abuy{background:rgba(52,211,153,.2);color:var(--grn);}
.sbt.asell{background:rgba(248,113,113,.2);color:var(--red);}
.sbt.ain{background:rgba(52,211,153,.2);color:var(--grn);}
.sbt.aout{background:rgba(248,113,113,.2);color:var(--red);}
.sumbox{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:11px;
  padding:10px 13px;font-size:13px;font-weight:700;color:var(--acc);display:none;margin:3px 0 7px;}
.btnp{width:100%;padding:14px;border-radius:12px;background:var(--acc);color:#000;
  font-size:15px;font-weight:800;border:none;cursor:pointer;margin-top:5px;}
.btns{width:100%;padding:13px;border-radius:12px;background:var(--bg3);color:var(--tx2);
  font-size:14px;font-weight:700;border:1px solid var(--bdr);cursor:pointer;margin-top:6px;}
.empty{text-align:center;padding:36px 18px;color:var(--tx3);}
.empty .ei{font-size:32px;margin-bottom:8px;}
.drow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bdr);}
.drow:last-child{border-bottom:none;}
.bwrap{width:65px;height:4px;background:var(--bg3);border-radius:2px;margin:0 7px;overflow:hidden;}
.bbar{height:100%;border-radius:2px;}
.rsug{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:11px;
  padding:9px 13px;margin:5px 15px;font-size:11px;color:var(--acc);font-weight:600;}
.fxbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:11px;scrollbar-width:none;}
.fxbar::-webkit-scrollbar{display:none;}
.fxchip{flex-shrink:0;background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:7px 11px;text-align:center;min-width:68px;}
.fxchip .fc{font-size:9px;color:var(--tx3);font-weight:700;letter-spacing:.5px;}
.fxchip .fv{font-size:14px;font-weight:800;color:var(--acc);}
</style>
</head>
<body>

<div id="topbar">

<script>
// ── 儲存 ──
var _mem = {};
function sg(k) {
  try {
    var v = window.localStorage.getItem(k);
    if (v !== null) { var p = JSON.parse(v); _mem[k] = p; return p; }
  } catch(e) {}
  return (_mem[k] !== undefined) ? _mem[k] : null;
}
function ss(k, v) {
  _mem[k] = v;
  try { window.localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
}

// ── 상수 ──
var BUILTIN = {
  TW:   [['0050','台灣50 ETF'],['2330','台積電'],['2454','聯發科']],
  US:   [['AMZN','Amazon'],['AVDV','Avantis Intl SC'],['AVES','Avantis EM'],['AVUV','Avantis US SC'],
         ['CQQQ','China Tech'],['DXYZ','Destiny Tech100'],['GLD','SPDR Gold'],
         ['GOOG','Alphabet'],['INTC','Intel'],['MCHI','MSCI China'],['NVDA','Nvidia'],
         ['QQQ','Invesco QQQ'],['TSM','TSMC ADR'],['TSLA','Tesla'],['VOO','S&P500 ETF'],
         ['VT','Total World'],['VTI','Total US'],['VXUS','Total Intl']],
  JP:   [['2559','SBI日本投資信託']],
  UK:   [['VWRA','Vanguard All-World'],['AVGS','Avantis Global']],
  FUND: [['安聯台灣科技基金','安聯台灣科技基金','ACDD04-2531']]
};
var COLORS = ['#00d4aa','#a78bfa','#0090ff','#ffd166','#ff6b35','#64748b','#94a3b8','#60a5fa','#f97316','#34d399'];
var MKT_E = {TW:'🇹🇼', US:'🇺🇸', JP:'🇯🇵', UK:'🇬🇧', FUND:'💰'};
var CUTOFF = '2026-03-26';

// ── 初始化 ──
function init() {
  if (!sg('trades')) ss('trades', []);
  if (!sg('cash'))   ss('cash', {CASH_TW:[],CASH_OTH:[],CASH_US:[],CASH_FX:[],CASH_JP:[]});
  if (!sg('prices')) ss('prices', {});
  if (!sg('fx'))     ss('fx', {USD:31.92, JPY:0.2, GBP:41.0});
}

// ── 工具 ──
function today() {
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function n2(n, dec) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (!dec) dec = 0;
  return Number(n).toLocaleString('zh-TW', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function signed(n, dec) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '-') + n2(Math.abs(n), dec || 0);
}
function pct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + (n * 100).toFixed(2) + '%';
}
function getFx() { return sg('fx') || {USD:31.92, JPY:0.2, GBP:41.0}; }
function toTWD(amt, cur) {
  if (!cur || cur === 'TWD') return amt;
  var fx = getFx();
  return amt * (fx[cur] || 1);
}
function getCur(mkt) {
  if (mkt === 'TW' || mkt === 'FUND') return 'TWD';
  if (mkt === 'JP') return 'JPY';
  return 'USD';
}
function ge(id) { return document.getElementById(id); }
function allSyms(mkt) {
  var custom = sg('customSyms') || {};
  var b = BUILTIN[mkt] || [];
  var c = custom[mkt] || [];
  return b.concat(c);
}

// ── FIFO ──
function fifo() {
  var trades = sg('trades') || [];
  trades.sort(function(a,b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
  var lots = {}, meta = {}, realized = [];
  var i, j, tx, s, lot, take, qty, ct, cs, cur, pnl;
  for (i = 0; i < trades.length; i++) {
    tx = trades[i]; s = tx.symbol;
    if (!lots[s]) lots[s] = [];
    if (!meta[s]) meta[s] = {symbol:s, name:tx.name, market:tx.market, currency:getCur(tx.market)};
    if (tx.action === 'BUY') {
      lots[s].push({shares:tx.shares, price:tx.price});
    } else if (tx.action === 'SELL') {
      qty = tx.shares; ct = 0; cs = 0;
      while (qty > 0.00001 && lots[s].length > 0) {
        lot = lots[s][0];
        take = Math.min(lot.shares, qty);
        ct += take * lot.price; cs += take; qty -= take; lot.shares -= take;
        if (lot.shares < 0.00001) lots[s].shift();
      }
      cur = getCur(tx.market);
      pnl = tx.shares * tx.price - (tx.fee || 0) - ct;
      realized.push({
        date:tx.date, symbol:s, name:tx.name, market:tx.market,
        shares:tx.shares, avgCost:(cs>0?ct/cs:0), sellPrice:tx.price,
        pnl:pnl, pnlTwd:toTWD(pnl,cur), pnlPct:(ct>0?pnl/ct:0), currency:cur
      });
    }
  }
  var holdings = [], ts, tc, symKey;
  for (symKey in lots) {
    ts = 0; tc = 0;
    for (j = 0; j < lots[symKey].length; j++) {
      ts += lots[symKey][j].shares;
      tc += lots[symKey][j].shares * lots[symKey][j].price;
    }
    if (ts < 0.00001) continue;
    holdings.push({
      symbol:symKey, name:meta[symKey].name, market:meta[symKey].market,
      currency:meta[symKey].currency, shares:ts, avgCost:tc/ts, totalCost:tc
    });
  }
  return {holdings:holdings, realized:realized};
}

function cashBal(key) {
  var rows = (sg('cash') || {})[key] || [];
  var s = 0;
  for (var i = 0; i < rows.length; i++) s += rows[i].flow === 'IN' ? rows[i].amount : -rows[i].amount;
  return s;
}

function calcAll() {
  var fd = fifo();
  var prices = sg('prices') || {};
  var mkt = {TW:0,FUND:0,US:0,UK:0,JP:0};
  var mktO = {TW:0,FUND:0,US:0,UK:0,JP:0};
  var unreal = 0, i, h, px, mv, mvT, cT;
  for (i = 0; i < fd.holdings.length; i++) {
    h = fd.holdings[i];
    px = prices[h.symbol] || h.avgCost;
    mv = h.shares * px;
    mvT = toTWD(mv, h.currency);
    cT = toTWD(h.totalCost, h.currency);
    if (mkt[h.market] !== undefined) { mkt[h.market] += mvT; mktO[h.market] += mv; }
    unreal += mvT - cT;
  }
  var cTW = cashBal('CASH_TW'), cOTH = cashBal('CASH_OTH');
  var cUS = cashBal('CASH_US'), cFX = cashBal('CASH_FX'), cJP = cashBal('CASH_JP');
  var cTWt=cTW, cOTHt=cOTH, cUSt=toTWD(cUS,'USD'), cFXt=toTWD(cFX,'USD'), cJPt=toTWD(cJP,'JPY');
  var total = mkt.TW+mkt.FUND+mkt.US+mkt.UK+mkt.JP+cTWt+cOTHt+cUSt+cFXt+cJPt;
  var totReal = 0, mn = today().slice(0,7), mReal = 0, r;
  for (i = 0; i < fd.realized.length; i++) {
    r = fd.realized[i];
    totReal += r.pnlTwd;
    if (r.date.slice(0,7) === mn) mReal += r.pnlTwd;
  }
  return {fd:fd, mkt:mkt, mktO:mktO, total:total, unreal:unreal, totReal:totReal, mReal:mReal,
          cTW:cTW,cOTH:cOTH,cUS:cUS,cFX:cFX,cJP:cJP,cTWt:cTWt,cOTHt:cOTHt,cUSt:cUSt,cFXt:cFXt,cJPt:cJPt};
}

  body += '<div><div style="font-size:19px;font-weight:800">'+h.symbol+'</div><div style="font-size:12px;color:var(--tx3)">'+h.name+'</div></div></div>';
  body += drow('持股數', n2(h.shares,4));
  body += drow('平均成本', n2(h.avgCost,4)+' '+h.currency);
  body += drow('現價', n2(px,4)+' '+h.currency);
  body += drow('現價 TWD', 'NT$ '+n2(toTWD(px,h.currency),2));
  body += drow('市值 (原幣)', n2(mv,2)+' '+h.currency);
  body += drow('市值 TWD', 'NT$ '+n2(mvT));
  body += drow('總成本', n2(h.totalCost,2)+' '+h.currency);
  body += '<div class="drow"><span style="font-size:13px;color:var(--tx2)">未實現損益</span>';
  body += '<span class="'+cls+'" style="font-size:13px;font-weight:700">'+signed(pnlT)+' ('+pct(h.totalCost>0?pnl/h.totalCost:0)+')</span></div>';
  body += '<div style="margin-top:14px"><div class="lbl">更新現價 ('+h.currency+')</div>';
  body += '<div style="display:flex;gap:7px"><input type="number" class="inp" id="px-inp" value="'+px+'" inputmode="decimal" style="flex:1">';
  body += '<button onclick="savePxOne(\''+sym+'\')" style="padding:11px 14px;border-radius:11px;background:var(--acc);color:#000;font-weight:700;border:none;cursor:pointer;flex-shrink:0">更新</button></div></div>';
  ge('detail-body').innerHTML = body;
  openOv('ov-detail');
}
function drow(l, v) {
  return '<div class="drow"><span style="font-size:13px;color:var(--tx2)">'+l+'</span><span style="font-size:13px;font-weight:700">'+v+'</span></div>';
}
function savePxOne(sym) {
  var v = parseFloat(ge('px-inp').value);
  if (!v || v<=0) return;
  var p = sg('prices') || {}; p[sym] = v; ss('prices', p);
  closeOv('ov-detail'); renderAll();
}

// ── 即時報價 ──
function fetchQuotes() {
  var fd = fifo(), prices = sg('prices') || {};
  var usList = [], jpList = [], ukList = [], i, h;
  for (i = 0; i < fd.holdings.length; i++) {
    h = fd.holdings[i];
    if (h.market==='US' && usList.indexOf(h.symbol)<0) usList.push(h.symbol);
    else if (h.market==='JP' && jpList.indexOf(h.symbol+'.T')<0) jpList.push(h.symbol+'.T');
    else if (h.market==='UK' && ukList.indexOf(h.symbol+'.L')<0) ukList.push(h.symbol+'.L');
  }
  var rebalUS = ['VTI','VXUS','VT'], rebalUK = ['VWRA','AVGS'];
  for (i=0;i<rebalUS.length;i++) { if (usList.indexOf(rebalUS[i])<0) usList.push(rebalUS[i]); }
  for (i=0;i<rebalUK.length;i++) { if (ukList.indexOf(rebalUK[i]+'.L')<0) ukList.push(rebalUK[i]+'.L'); }
  if (jpList.indexOf('2559.T')<0) jpList.push('2559.T');

  var all = usList.concat(jpList).concat(ukList);
  if (!all.length) { alert('沒有可更新的標的'); return; }

  var btn = ge('btnQuote');
  btn.textContent = '⏳'; btn.style.pointerEvents = 'none';

  var url = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + encodeURIComponent(all.join(','));
  var proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
  var xhr = new XMLHttpRequest();
  xhr.open('GET', proxy, true);
  xhr.timeout = 15000;
  xhr.ontimeout = function() { btn.textContent='⚡'; btn.style.pointerEvents=''; alert('報價更新逾時'); };
  xhr.onerror = function() { btn.textContent='⚡'; btn.style.pointerEvents=''; alert('網路錯誤'); };
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    btn.textContent = '⚡'; btn.style.pointerEvents = '';
    if (xhr.status !== 200) { alert('報價失敗 (HTTP '+xhr.status+')'); return; }
    try {
      var wrap = JSON.parse(xhr.responseText);
      var data = JSON.parse(wrap.contents);
      var results = data.quoteResponse && data.quoteResponse.result ? data.quoteResponse.result : [];
      var updated = 0, q, sym;
      for (var ri = 0; ri < results.length; ri++) {
        q = results[ri];
        sym = q.symbol.replace('.T','').replace('.L','');
        if (q.regularMarketPrice && q.regularMarketPrice > 0) { prices[sym] = q.regularMarketPrice; updated++; }
      }
      ss('prices', prices); ss('fxTime', today()); renderAll();
      alert('✅ 已更新 '+updated+' 個報價');
    } catch(e) { alert('解析失敗: '+e.message); }
  };
  xhr.send();
}

// ── 刪除交易 ──
function delTrade(id, e) {
  e.stopPropagation();
  if (!confirm('確定刪除？')) return;
  var trades = sg('trades') || [], i, result = [];
  for (i = 0; i < trades.length; i++) { if (trades[i].id !== id) result.push(trades[i]); }
  ss('trades', result); renderAll();
}

// ── 代號管理 ──
var _symMkt = 'US';
function openSymMgr() {
  _symMkt = ge('t-mkt').value || 'US';
  renderSymMgr(); openOv('ov-sym');
}
function renderSymMgr() {
  var custom = sg('customSyms') || {};
  var mktLabels = {TW:'🇹🇼台股',US:'🇺🇸美股',JP:'🇯🇵日股',UK:'🇬🇧複委託',FUND:'💰基金'};
  var tabs = '', mkeys = ['TW','US','JP','UK','FUND'], i;
  for (i=0;i<mkeys.length;i++) {
    var m=mkeys[i], on=m===_symMkt;
    tabs += '<div onclick="switchSymMkt(\''+m+'\')" style="flex-shrink:0;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;background:'+(on?'rgba(0,212,170,.2)':'var(--bg3)')+';color:'+(on?'var(--acc)':'var(--tx3)')+';border:1px solid '+(on?'rgba(0,212,170,.3)':'var(--bdr)')+'">'+mktLabels[m]+'</div>';
  }
  var builtIn = BUILTIN[_symMkt] || [];
  var customs = custom[_symMkt] || [];
  var all = builtIn.concat(customs);
  var list = '', s;
  for (i=0;i<all.length;i++) {
    s = all[i];
    var isCustom = i >= builtIn.length;
    list += '<div style="display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr)">';
    list += '<div style="flex:1"><div style="font-size:13px;font-weight:700">'+s[0]+'</div><div style="font-size:10px;color:var(--tx3)">'+s[1]+(s[2]?' · '+s[2]:'')+'</div></div>';
    if (isCustom) {
      list += '<div onclick="delCustomSym(\''+s[0]+'\')" style="width:26px;height:26px;border-radius:7px;background:rgba(248,113,113,.12);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer">✕</div>';
    } else {
      list += '<div style="font-size:9px;color:var(--tx3);padding:3px 7px;border-radius:5px;background:var(--bg3)">內建</div>';
    }
    list += '</div>';
  }
  var djField = _symMkt==='FUND' ? '<div style="margin-top:6px"><input type="text" class="inp" id="new-dj" placeholder="DJ代號（基金填）" style="font-size:14px"></div>' : '';
  ge('sym-body').innerHTML =
    '<div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:13px;scrollbar-width:none">'+tabs+'</div>' +
    '<div class="fg"><div class="lbl">新增代號</div>' +
    '<div style="display:flex;gap:6px"><input type="text" class="inp" id="new-sym" placeholder="代號(如AAPL)" style="flex:1;text-transform:uppercase"><input type="text" class="inp" id="new-name" placeholder="名稱" style="flex:1.5"></div>' +
    djField +
    '<button onclick="addCustomSym()" style="width:100%;margin-top:7px;padding:10px;border-radius:10px;background:var(--acc);color:#000;font-weight:700;border:none;cursor:pointer;font-size:14px">＋ 新增</button></div>' +
    '<div style="font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px">現有 ('+all.length+')</div>' +
    (list || '<div class="empty"><div>暫無</div></div>');
}
function switchSymMkt(m) { _symMkt = m; renderSymMgr(); }
function addCustomSym() {
  var sym = (ge('new-sym').value||'').trim().toUpperCase();
  var name = (ge('new-name').value||'').trim() || sym;
  var dj = ge('new-dj') ? (ge('new-dj').value||'').trim() : '';
  if (!sym) { alert('請輸入代號'); return; }
  var custom = sg('customSyms') || {};
  if (!custom[_symMkt]) custom[_symMkt] = [];
  var all = BUILTIN[_symMkt].concat(custom[_symMkt]), exists = false, i;
  for (i=0;i<all.length;i++) { if (all[i][0]===sym) { exists=true; break; } }
  if (exists) { alert(sym+' 已存在'); return; }
  custom[_symMkt].push(dj ? [sym,name,dj] : [sym,name]);
  ss('customSyms', custom);
  ge('new-sym').value=''; ge('new-name').value='';
  if (ge('new-dj')) ge('new-dj').value='';
  renderSymMgr();
}
function delCustomSym(sym) {
  var custom = sg('customSyms') || {}, i, r=[];
  if (!custom[_symMkt]) return;
  for (i=0;i<custom[_symMkt].length;i++) { if (custom[_symMkt][i][0]!==sym) r.push(custom[_symMkt][i]); }
  custom[_symMkt] = r; ss('customSyms', custom); renderSymMgr();
}

// ── 新增交易 ──
var _act = 'BUY';
function setAct(a) {
  _act = a;
  ge('sbt-buy').className = 'sbt' + (a==='BUY'?' abuy':'');
  ge('sbt-sell').className = 'sbt' + (a==='SELL'?' asell':'');
  updSum();
}
function onMktChg() {
  var m = ge('t-mkt').value;
  var syms = allSyms(m);
  var opts = '', i;
  for (i=0;i<syms.length;i++) {
    opts += '<option value="'+syms[i][0]+'">'+syms[i][0]+(syms[i][1]&&syms[i][1]!==syms[i][0]?' — '+syms[i][1]:'')+'</option>';
  }
  ge('t-sym').innerHTML = opts;
  ge('t-dj-fg').style.display = m==='FUND'?'block':'none';
  ge('t-sh-lbl').textContent = m==='FUND'?'受益人數':'股數';
  onSymChg();
}
function onSymChg() {
  var m = ge('t-mkt').value, sym = ge('t-sym').value;
  var syms = allSyms(m), i;
  for (i=0;i<syms.length;i++) {
    if (syms[i][0]===sym) {
      ge('t-name').value = syms[i][1]||sym;
      if (syms[i][2] && ge('t-dj')) ge('t-dj').value = syms[i][2];
      break;
    }
  }
  updSum();
}
function updSum() {
  var pr=parseFloat(ge('t-price').value)||0, sh=parseFloat(ge('t-shares').value)||0, fe=parseFloat(ge('t-fee').value)||0;
  var m=ge('t-mkt').value, cur=getCur(m), box=ge('t-sum');
  if (!pr||!sh) { box.style.display='none'; return; }
  var tot = _act==='BUY' ? pr*sh+fe : pr*sh-fe;
  box.style.display='block';
  box.textContent = (_act==='BUY'?'買入':'賣出')+' '+sh+' × '+pr+' = '+n2(tot,4)+' '+cur;
}
function doTrade() {
  var sym=ge('t-sym').value, name=ge('t-name').value, mkt=ge('t-mkt').value;
  var date=ge('t-date').value, pr=parseFloat(ge('t-price').value), sh=parseFloat(ge('t-shares').value), fe=parseFloat(ge('t-fee').value)||0;
  if (!sym||!date||!pr||!sh||pr<=0||sh<=0) { alert('請填寫所有必填欄位'); return; }
  var trades = sg('trades')||[];
  trades.push({id:Date.now(), symbol:sym, name:name, market:mkt, action:_act, date:date, price:pr, shares:sh, fee:fe});
  ss('trades', trades);
  if (date >= CUTOFF) {
    var amt = _act==='BUY' ? -(pr*sh+fe) : pr*sh-fe;
    var ck = (mkt==='TW'||mkt==='FUND') ? 'CASH_TW' : mkt==='JP' ? 'CASH_JP' : (sym==='VWRA'||sym==='AVGS') ? 'CASH_FX' : 'CASH_US';
    addCashRow(ck, date, (_act==='BUY'?'買入 ':'賣出 ')+sym+' × '+sh, amt<0?'OUT':'IN', Math.abs(amt));
  }
  closeOv('ov-trade'); renderAll();
}

// ── 新增現金 ──
var _flow = 'IN';
function setFlow(f) {
  _flow = f;
  ge('sbt-in').className  = 'sbt' + (f==='IN' ?' ain':'');
  ge('sbt-out').className = 'sbt' + (f==='OUT'?' aout':'');
}
function doCash() {
  var acct=ge('c-acct').value, date=ge('c-date').value, amt=parseFloat(ge('c-amt').value), desc=ge('c-desc').value;
  if (!date||!amt||amt<=0) { alert('請填寫所有必填欄位'); return; }
  addCashRow(acct, date, desc, _flow, amt);
  closeOv('ov-cash'); renderAll();
}
function addCashRow(acct, date, desc, flow, amount) {
  var cash = sg('cash') || {CASH_TW:[],CASH_OTH:[],CASH_US:[],CASH_FX:[],CASH_JP:[]};
  if (!cash[acct]) cash[acct] = [];
  cash[acct].push({id:Date.now(), date:date, desc:desc, flow:flow, amount:amount});
  cash[acct].sort(function(a,b){ return a.date<b.date?-1:a.date>b.date?1:0; });
  ss('cash', cash);
}

// ── 匯率 ──
function openFx() {
  var fx=getFx(); ge('fx-usd').value=fx.USD; ge('fx-jpy').value=fx.JPY; ge('fx-gbp').value=fx.GBP; openOv('ov-fx');
}
function saveFx() {
  var u=parseFloat(ge('fx-usd').value), j=parseFloat(ge('fx-jpy').value), g=parseFloat(ge('fx-gbp').value);
  if (!u||!j||!g) { alert('請填寫所有匯率'); return; }
  ss('fx',{USD:u,JPY:j,GBP:g}); ss('fxTime',today()); closeOv('ov-fx'); renderAll();
}

// ── 快照 ──
function snap() {
  var d=calcAll(), snaps=sg('snaps')||[];
  snaps.push({date:today(), total:d.total}); ss('snaps',snaps);
  alert('📸 NT$ '+n2(d.total));
}

// ── UI ──
function goPage(id, tab) {
  var pages = document.querySelectorAll('.page'), tabs = document.querySelectorAll('.tab'), i;
  for (i=0;i<pages.length;i++) pages[i].classList.remove('on');
  for (i=0;i<tabs.length;i++) tabs[i].classList.remove('on');
  ge('pg-'+id).classList.add('on');
  if (tab) tab.classList.add('on');
}
function openOv(id) { ge(id).classList.add('on'); document.body.style.overflow='hidden'; }
function closeOv(id) { ge(id).classList.remove('on'); document.body.style.overflow=''; }

ge('fab').addEventListener('click', function() {
  var pg = document.querySelector('.page.on').id;
  if (pg==='pg-cash') {
    ge('c-date').value=today(); _flow='IN';
    ge('sbt-in').className='sbt ain'; ge('sbt-out').className='sbt';
    openOv('ov-cash');
  } else {
    ge('t-date').value=today(); _act='BUY';
    ge('sbt-buy').className='sbt abuy'; ge('sbt-sell').className='sbt';
    onMktChg(); openOv('ov-trade');
  }
});
ge('btnFx').addEventListener('click', openFx);
ge('btnSnap').addEventListener('click', snap);
ge('btnQuote').addEventListener('click', fetchQuotes);

var ovs = document.querySelectorAll('.ov'), oi;
for (oi=0;oi<ovs.length;oi++) {
  ovs[oi].addEventListener('click', function(e) { if (e.target===this) closeOv(this.id); });
}

// ── 啟動 ──
init();
renderAll();
</script>
