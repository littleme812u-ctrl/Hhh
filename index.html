<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="投資組合">
<meta name="theme-color" content="#0a0e1a">
<title>投資組合</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1c2333;
  --card: #161d2e;
  --border: rgba(255,255,255,0.07);
  --accent: #00d4aa;
  --accent2: #0090ff;
  --accent3: #a78bfa;
  --accent4: #ffd166;
  --red: #f87171;
  --green: #34d399;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
  --tab-h: 60px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'SF Pro Display', -apple-system, sans-serif; }

/* ── 頂部 ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  background: rgba(10,14,26,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-title span { color: var(--accent); }
.topbar-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
}

/* ── 底部 Tab ── */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding-bottom: var(--safe-bot);
  background: rgba(10,14,26,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
}
.tab {
  flex: 1; height: var(--tab-h); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  cursor: pointer; transition: all .2s;
  font-size: 9px; color: var(--text3); font-weight: 600; letter-spacing: 0.3px;
}
.tab svg { width: 22px; height: 22px; }
.tab.active { color: var(--accent); }
.tab.active svg path, .tab.active svg circle, .tab.active svg rect, .tab.active svg polyline, .tab.active svg line { stroke: var(--accent); }

/* ── 主內容 ── */
.pages { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
.page {
  position: absolute; inset: 0; overflow-y: auto;
  padding-top: calc(var(--safe-top) + 60px);
  padding-bottom: calc(var(--tab-h) + var(--safe-bot) + 16px);
  display: none;
  -webkit-overflow-scrolling: touch;
}
.page.active { display: block; }
.page-content { padding: 16px; }

/* ── 卡片 ── */
.card {
  background: var(--card); border-radius: 16px;
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px;
}
.card-header {
  padding: 14px 16px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border);
}
.card-title { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; }
.card-body { padding: 16px; }

/* ── 總資產 Hero ── */
.hero {
  background: linear-gradient(135deg, #0d1929 0%, #1a2640 50%, #0d2035 100%);
  border-radius: 20px; padding: 24px; margin-bottom: 12px;
  border: 1px solid rgba(0,212,170,0.15); position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,170,0.12) 0%, transparent 70%);
}
.hero-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.hero-amount { font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; }
.hero-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.hero-pnl { display: flex; gap: 16px; }
.hero-pnl-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 8px 12px; flex: 1; }
.hero-pnl-item .label { font-size: 9px; color: var(--text3); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px; }
.hero-pnl-item .val { font-size: 14px; font-weight: 700; }

/* ── 資產分布列表 ── */
.asset-row {
  display: flex; align-items: center; padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.asset-row:last-child { border-bottom: none; }
.asset-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
.asset-name { flex: 1; font-size: 13px; font-weight: 500; }
.asset-orig { font-size: 11px; color: var(--text3); margin-top: 1px; }
.asset-right { text-align: right; }
.asset-twd { font-size: 13px; font-weight: 700; }
.asset-pct { font-size: 11px; color: var(--text2); margin-top: 1px; }

/* ── 持倉列表 ── */
.holding-row {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .15s;
}
.holding-row:active { background: rgba(255,255,255,0.03); }
.holding-row:last-child { border-bottom: none; }
.holding-mkt { width: 28px; height: 28px; border-radius: 8px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 13px; margin-right: 10px; flex-shrink: 0; }
.holding-info { flex: 1; min-width: 0; }
.holding-sym { font-size: 14px; font-weight: 700; }
.holding-name { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.holding-right { text-align: right; }
.holding-mv { font-size: 14px; font-weight: 700; }
.holding-pnl { font-size: 11px; margin-top: 1px; font-weight: 600; }
.pos { color: var(--green); }
.neg { color: var(--red); }

/* ── 交易表格 ── */
.tx-row {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.tx-row:last-child { border-bottom: none; }
.tx-badge {
  font-size: 9px; font-weight: 800; letter-spacing: 0.5px;
  padding: 3px 7px; border-radius: 6px; margin-right: 10px; flex-shrink: 0;
}
.tx-badge.buy { background: rgba(52,211,153,0.15); color: var(--green); }
.tx-badge.sell { background: rgba(248,113,113,0.15); color: var(--red); }
.tx-info { flex: 1; min-width: 0; }
.tx-sym { font-size: 14px; font-weight: 700; }
.tx-detail { font-size: 11px; color: var(--text3); }
.tx-right { text-align: right; }
.tx-amt { font-size: 14px; font-weight: 700; }
.tx-date { font-size: 11px; color: var(--text3); }

/* ── 現金列表 ── */
.cash-row {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.cash-row:last-child { border-bottom: none; }
.cash-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; margin-right: 10px; flex-shrink: 0; }
.cash-info { flex: 1; }
.cash-desc { font-size: 13px; font-weight: 600; }
.cash-date { font-size: 11px; color: var(--text3); }
.cash-right { text-align: right; }
.cash-amt { font-size: 14px; font-weight: 700; }
.cash-bal { font-size: 11px; color: var(--text2); }

/* ── 再平衡 ── */
.rebal-section { margin-bottom: 12px; }
.rebal-title {
  font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1px;
  text-transform: uppercase; padding: 8px 16px; background: var(--bg3);
}
.rebal-row {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.rebal-row:last-child { border-bottom: none; }
.rebal-name { flex: 1; font-size: 13px; font-weight: 600; }
.rebal-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
.rebal-bar-wrap { width: 80px; height: 4px; background: var(--bg3); border-radius: 2px; margin: 0 10px; overflow: hidden; }
.rebal-bar { height: 100%; border-radius: 2px; transition: width .5s; }
.rebal-right { text-align: right; min-width: 60px; }
.rebal-pct { font-size: 13px; font-weight: 700; }
.rebal-diff { font-size: 10px; margin-top: 2px; }
.rebal-suggest {
  background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.2);
  border-radius: 12px; padding: 10px 14px; margin: 8px 16px;
  font-size: 12px; color: var(--accent); font-weight: 600;
}

/* ── 新增按鈕 FAB ── */
.fab {
  position: fixed; right: 20px; bottom: calc(var(--tab-h) + var(--safe-bot) + 16px);
  width: 52px; height: 52px; border-radius: 16px;
  background: var(--accent); color: #000; font-size: 24px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,212,170,0.4); cursor: pointer;
  transition: transform .15s; z-index: 50; border: none;
}
.fab:active { transform: scale(0.93); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border-radius: 24px 24px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto;
  padding: 20px 20px calc(var(--safe-bot) + 20px);
  border: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
}
.modal-handle { width: 36px; height: 4px; background: var(--bg3); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }

/* ── 表單 ── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; font-size: 15px; color: var(--text);
  -webkit-appearance: none; outline: none;
  transition: border-color .2s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.seg-ctrl { display: flex; background: var(--bg3); border-radius: 12px; padding: 3px; }
.seg-btn {
  flex: 1; padding: 9px; border-radius: 10px; border: none;
  background: none; color: var(--text2); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.seg-btn.active.buy { background: rgba(52,211,153,0.2); color: var(--green); }
.seg-btn.active.sell { background: rgba(248,113,113,0.2); color: var(--red); }
.seg-btn.active.in { background: rgba(52,211,153,0.2); color: var(--green); }
.seg-btn.active.out { background: rgba(248,113,113,0.2); color: var(--red); }
.summary-box {
  background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.2);
  border-radius: 12px; padding: 12px 14px; margin-top: 4px;
  font-size: 14px; font-weight: 700; color: var(--accent);
  display: none;
}
.btn-primary {
  width: 100%; padding: 16px; border-radius: 14px;
  background: var(--accent); color: #000; font-size: 16px; font-weight: 800;
  border: none; cursor: pointer; margin-top: 8px; transition: opacity .15s;
}
.btn-primary:active { opacity: 0.85; }
.btn-secondary {
  width: 100%; padding: 14px; border-radius: 14px;
  background: var(--bg3); color: var(--text2); font-size: 15px; font-weight: 700;
  border: 1px solid var(--border); cursor: pointer; margin-top: 8px;
}

/* ── 匯率條 ── */
.fx-bar {
  display: flex; gap: 8px; overflow-x: auto; padding: 0 0 2px;
  scrollbar-width: none; margin-bottom: 12px;
}
.fx-bar::-webkit-scrollbar { display: none; }
.fx-chip {
  flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 12px; min-width: 80px; text-align: center;
}
.fx-chip .cur { font-size: 10px; color: var(--text3); font-weight: 700; letter-spacing: 0.5px; }
.fx-chip .rate { font-size: 16px; font-weight: 800; color: var(--accent); }
.fx-chip .label { font-size: 9px; color: var(--text3); margin-top: 1px; }

/* ── Section header ── */
.section-hdr {
  font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1px;
  text-transform: uppercase; margin: 20px 0 8px; padding: 0 2px;
}

/* ── Empty state ── */
.empty { text-align: center; padding: 48px 24px; color: var(--text3); }
.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty .msg { font-size: 14px; font-weight: 600; }
.empty .sub { font-size: 12px; margin-top: 6px; }

/* ── Tooltip/Detail panel ── */
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.detail-row:last-child { border-bottom: none; }
.detail-label { font-size: 13px; color: var(--text2); }
.detail-val { font-size: 13px; font-weight: 700; }

/* ── Pie chart ── */
.pie-wrap { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
.pie-legend { flex: 1; }
.pie-legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.pie-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pie-legend-label { font-size: 12px; color: var(--text2); flex: 1; }
.pie-legend-pct { font-size: 12px; font-weight: 700; }

/* ── Loading ── */
.loading { text-align: center; padding: 32px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<!-- 頂部 -->
<div class="topbar">
  <div class="topbar-title">投資<span>組合</span></div>
  <div style="display:flex;gap:8px;">
    <div class="topbar-btn" id="fxBtn" title="更新匯率">💱</div>
    <div class="topbar-btn" id="snapshotBtn" title="快照">📸</div>
  </div>
</div>

<!-- 頁面 -->
<div class="pages">
  <!-- 總資產 -->
  <div class="page active" id="page-home">
    <div class="page-content">
      <div class="fx-bar" id="fxBar">
        <div class="fx-chip"><div class="cur">USD</div><div class="rate" id="fxUSD">—</div><div class="label">TWD</div></div>
        <div class="fx-chip"><div class="cur">JPY</div><div class="rate" id="fxJPY">—</div><div class="label">TWD</div></div>
        <div class="fx-chip"><div class="cur">GBP</div><div class="rate" id="fxGBP">—</div><div class="label">TWD</div></div>
        <div class="fx-chip"><div class="cur">更新</div><div class="rate" style="font-size:11px" id="fxTime">—</div><div class="label">匯率</div></div>
      </div>

      <div class="hero">
        <div class="hero-label">總資產 (TWD)</div>
        <div class="hero-amount" id="heroTotal">— —</div>
        <div class="hero-sub" id="heroSub">最後更新 —</div>
        <div class="hero-pnl">
          <div class="hero-pnl-item">
            <div class="label">未實現損益</div>
            <div class="val" id="heroUnreal">—</div>
          </div>
          <div class="hero-pnl-item">
            <div class="label">已實現損益</div>
            <div class="val" id="heroReal">—</div>
          </div>
        </div>
      </div>

      <div class="section-hdr">資產分布</div>
      <div class="card">
        <div id="assetList"></div>
      </div>

      <div class="section-hdr">現金帳戶</div>
      <div class="card">
        <div id="cashSummary"></div>
      </div>
    </div>
  </div>

  <!-- 持倉 -->
  <div class="page" id="page-holdings">
    <div class="page-content">
      <div class="section-hdr">未實現損益</div>
      <div class="card" id="holdingsList"></div>
      <div class="section-hdr">已實現損益</div>
      <div class="card" id="realizedList"></div>
    </div>
  </div>

  <!-- 交易 -->
  <div class="page" id="page-trades">
    <div class="page-content">
      <div id="tradeFilters" style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;">
        <div class="seg-btn active" style="background:rgba(0,212,170,0.15);color:var(--accent);border-radius:10px;padding:7px 14px;border:1px solid rgba(0,212,170,0.3);white-space:nowrap;font-size:12px;" onclick="filterTrades('all',this)">全部</div>
        <div class="seg-btn" style="border-radius:10px;padding:7px 14px;border:1px solid var(--border);white-space:nowrap;font-size:12px;background:var(--card);" onclick="filterTrades('TW',this)">🇹🇼 台股</div>
        <div class="seg-btn" style="border-radius:10px;padding:7px 14px;border:1px solid var(--border);white-space:nowrap;font-size:12px;background:var(--card);" onclick="filterTrades('US',this)">🇺🇸 美股</div>
        <div class="seg-btn" style="border-radius:10px;padding:7px 14px;border:1px solid var(--border);white-space:nowrap;font-size:12px;background:var(--card);" onclick="filterTrades('JP',this)">🇯🇵 日股</div>
        <div class="seg-btn" style="border-radius:10px;padding:7px 14px;border:1px solid var(--border);white-space:nowrap;font-size:12px;background:var(--card);" onclick="filterTrades('FUND',this)">💰 基金</div>
      </div>
      <div class="card" id="tradesList"></div>
    </div>
  </div>

  <!-- 現金 -->
  <div class="page" id="page-cash">
    <div class="page-content">
      <div id="cashAccounts"></div>
    </div>
  </div>

  <!-- 再平衡 -->
  <div class="page" id="page-rebal">
    <div class="page-content">
      <div class="section-hdr" style="margin-top:0">第一層：台股 vs 全球大盤</div>
      <div class="card" id="rebalTier1"></div>

      <div class="section-hdr">第二層：VWRA vs AVGS</div>
      <div class="card" id="rebalTier2"></div>

      <div class="section-hdr">全球標的明細</div>
      <div class="card" id="rebalDetail"></div>
    </div>
  </div>
</div>

<!-- 底部 Tab -->
<div class="tabbar">
  <div class="tab active" onclick="showPage('home',this)" id="tab-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    總資產
  </div>
  <div class="tab" onclick="showPage('holdings',this)" id="tab-holdings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    持倉
  </div>
  <div class="tab" onclick="showPage('trades',this)" id="tab-trades">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
    交易
  </div>
  <div class="tab" onclick="showPage('cash',this)" id="tab-cash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    現金
  </div>
  <div class="tab" onclick="showPage('rebal',this)" id="tab-rebal">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    再平衡
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn">＋</button>

<!-- 新增交易 Modal -->
<div class="modal-overlay" id="tradeModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ 新增交易</div>
    <div class="form-group">
      <label class="form-label">買 / 賣</label>
      <div class="seg-ctrl">
        <button class="seg-btn active buy" onclick="setAction('BUY',this)">📈 買入</button>
        <button class="seg-btn sell" onclick="setAction('SELL',this)">📉 賣出</button>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">市場</label>

<script>
// ══════════════════════════════════════════════════════════
// 資料儲存
// ══════════════════════════════════════════════════════════
const DB = {
  get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
};

// 初始資料結構
function initData() {
  if (!DB.get('trades'))   DB.set('trades', []);
  if (!DB.get('cash'))     DB.set('cash', { CASH_TW:[], CASH_OTH:[], CASH_US:[], CASH_FX:[], CASH_JP:[] });
  if (!DB.get('prices'))   DB.set('prices', {});
  if (!DB.get('fx'))       DB.set('fx', { USD:31.92, JPY:0.2000, GBP:41.0 });
  if (!DB.get('symbols'))  DB.set('symbols', getDefaultSymbols());
  if (!DB.get('snapshots')) DB.set('snapshots', []);
}

function getDefaultSymbols() {
  return {
    TW:   [['0050','台灣50 ETF'],['2330','台積電'],['2454','聯發科']],
    US:   [['AMZN','Amazon'],['AVDV','Avantis Intl SC'],['AVES','Avantis EM'],['AVUV','Avantis US SC'],
           ['CQQQ','iShares China Tech'],['DXYZ','Destiny Tech100'],['GLD','SPDR Gold'],
           ['GOOG','Alphabet'],['INTC','Intel'],['MCHI','iShares MSCI China'],['NVDA','Nvidia'],
           ['QQQ','Invesco QQQ'],['TSM','TSMC ADR'],['TSLA','Tesla'],['VOO','Vanguard S&P500'],
           ['VT','Vanguard Total World'],['VTI','Vanguard Total US'],['VXUS','Vanguard Total Intl']],
    JP:   [['2559','SBI日本投資信託']],
    UK:   [['VWRA','Vanguard FTSE All-World'],['AVGS','Avantis Global Equity']],
    FUND: [['安聯台灣科技基金','安聯台灣科技基金','ACDD04-2531']],
  };
}

// ══════════════════════════════════════════════════════════
// 工具函式
// ══════════════════════════════════════════════════════════
const FMT = {
  num: (n, dec=0) => {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return new Intl.NumberFormat('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n);
  },
  pct: (n) => n === null || isNaN(n) ? '—' : (n >= 0 ? '+' : '') + (n*100).toFixed(2) + '%',
  signed: (n, dec=0) => {
    if (n === null || isNaN(n)) return '—';
    const s = FMT.num(Math.abs(n), dec);
    return (n >= 0 ? '+' : '-') + s;
  },
  date: (d) => {
    const dt = new Date(d);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  },
  today: () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  },
};

function getFx() { return DB.get('fx') || { USD:31.92, JPY:0.2000, GBP:41.0 }; }
function toTWD(amt, cur) {
  const fx = getFx();
  if (cur === 'TWD') return amt;
  return amt * (fx[cur] || 1);
}
function getCurBySym(market, sym) {
  if (market === 'TW' || market === 'FUND') return 'TWD';
  if (market === 'JP') return 'JPY';
  return 'USD';
}
const MKT_EMOJI = { TW:'🇹🇼', US:'🇺🇸', JP:'🇯🇵', UK:'🇬🇧', FUND:'💰' };
const MKT_COLORS = ['#00d4aa','#a78bfa','#0090ff','#ffd166','#ff6b35','#64748b','#94a3b8','#60a5fa'];

// ══════════════════════════════════════════════════════════
// FIFO 損益計算
// ══════════════════════════════════════════════════════════
function computeFIFO() {
  const trades = DB.get('trades') || [];
  const sorted = [...trades].sort((a,b) => a.date.localeCompare(b.date));
  const lots = {}, meta = {};
  const realized = [];

  for (const tx of sorted) {
    const s = tx.symbol;
    if (!lots[s]) lots[s] = [];
    if (!meta[s]) meta[s] = { symbol:s, name:tx.name, market:tx.market, currency:getCurBySym(tx.market, s) };
    if (tx.action === 'BUY') {
      lots[s].push({ shares: tx.shares, price: tx.price });
    } else if (tx.action === 'SELL') {
      let qty = tx.shares, costTotal = 0, costShares = 0;
      while (qty > 0.00001 && lots[s].length > 0) {
        const lot = lots[s][0];
        const take = Math.min(lot.shares, qty);
        costTotal += take * lot.price; costShares += take; qty -= take; lot.shares -= take;
        if (lot.shares < 0.00001) lots[s].shift();
      }
      const avgCost = costShares > 0 ? costTotal / costShares : 0;
      const revenue = tx.shares * tx.price - (tx.fee||0);
      const pnl = revenue - costTotal;
      const cur = getCurBySym(tx.market, s);
      realized.push({ date:tx.date, symbol:s, name:tx.name, market:tx.market, shares:tx.shares, avgCost, sellPrice:tx.price, pnl, pnlTwd:toTWD(pnl, cur), pnlPct: costTotal>0 ? pnl/costTotal : 0, currency:cur });
    }
  }

  const holdings = [];
  for (const [s, lotList] of Object.entries(lots)) {
    let ts = 0, tc = 0;
    for (const l of lotList) { ts += l.shares; tc += l.shares * l.price; }
    if (ts < 0.00001) continue;
    holdings.push({ ...meta[s], shares:ts, avgCost:tc/ts, totalCost:tc });
  }
  return { holdings, realized };
}

function getCashBal(acct) {
  const rows = (DB.get('cash') || {})[acct] || [];
  return rows.reduce((s, r) => s + (r.flow === 'IN' ? r.amount : -r.amount), 0);
}

// ══════════════════════════════════════════════════════════
// 計算總資產
// ══════════════════════════════════════════════════════════
function calcPortfolio() {
  const { holdings, realized } = computeFIFO();
  const prices = DB.get('prices') || {};
  const fx = getFx();
  const mkt = { TW:0, FUND:0, US:0, UK:0, JP:0 };
  const mktOrig = { TW:0, FUND:0, US:0, UK:0, JP:0 };
  let unreal = 0;

  for (const h of holdings) {
    const cur = h.currency;
    const px = prices[h.symbol] || h.avgCost;
    const mv = h.shares * px;
    const mvT = toTWD(mv, cur);
    const cT = toTWD(h.totalCost, cur);
    if (mkt[h.market] !== undefined) { mkt[h.market] += mvT; mktOrig[h.market] += mv; }
    unreal += mvT - cT;
  }

  const cashTW  = getCashBal('CASH_TW');
  const cashOTH = getCashBal('CASH_OTH');
  const cashUS  = getCashBal('CASH_US');
  const cashFX  = getCashBal('CASH_FX');
  const cashJP  = getCashBal('CASH_JP');
  const cashTW_twd  = cashTW;
  const cashOTH_twd = cashOTH;
  const cashUS_twd  = toTWD(cashUS, 'USD');
  const cashFX_twd  = toTWD(cashFX, 'USD');
  const cashJP_twd  = toTWD(cashJP, 'JPY');
  const total = Object.values(mkt).reduce((a,b)=>a+b,0) + cashTW_twd + cashOTH_twd + cashUS_twd + cashFX_twd + cashJP_twd;

  const totReal   = realized.reduce((s,r) => s+r.pnlTwd, 0);
  const now = new Date();
  const ms = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthReal = realized.filter(r=>r.date.startsWith(ms)).reduce((s,r)=>s+r.pnlTwd,0);

  return { holdings, realized, mkt, mktOrig, cashTW, cashOTH, cashUS, cashFX, cashJP, cashTW_twd, cashOTH_twd, cashUS_twd, cashFX_twd, cashJP_twd, total, unreal, totReal, monthReal };
}

// ══════════════════════════════════════════════════════════
// 頁面渲染
// ══════════════════════════════════════════════════════════
function renderAll() {
  const d = calcPortfolio();

}

    { name:'其他台幣', orig:d.cashOTH, cur:'TWD', twd:d.cashOTH_twd },

  const total = items.reduce((s,x)=>s+x.twd,0)||1;

        <div class="asset-twd">NT$ ${FMT.num(x.twd)}</div>
        <div class="asset-pct">${(pct*100).toFixed(1)}%</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('assetList').innerHTML = html || '<div class="empty"><div class="icon">📊</div><div class="msg">無資料</div></div>';

  // 現金概覽
  const cashItems = [
    { name:'台股交割', val:d.cashTW, cur:'TWD' },
    { name:'其他台幣', val:d.cashOTH, cur:'TWD' },
    { name:'美股', val:d.cashUS, cur:'USD' },
    { name:'複委託', val:d.cashFX, cur:'USD' },
    { name:'日股', val:d.cashJP, cur:'JPY' },
  ];
  const cashHtml = cashItems.map(x => `
    <div class="asset-row">
      <div style="flex:1;font-size:13px;font-weight:600">${x.name}</div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700">${FMT.num(x.val, x.cur==='TWD'?0:2)} ${x.cur}</div>
        <div style="font-size:11px;color:var(--text3)">≈ NT$ ${FMT.num(toTWD(x.val, x.cur))}</div>
      </div>
    </div>`).join('');
  document.getElementById('cashSummary').innerHTML = cashHtml;
}

function renderHoldings(d) {
  const prices = DB.get('prices') || {};

  const holdHtml = d.holdings.length === 0
    ? '<div class="empty"><div class="icon">📈</div><div class="msg">暫無持倉</div><div class="sub">點右下角 ＋ 新增交易</div></div>'
    : d.holdings.map(h => {
        const cur = h.currency;
        const px = prices[h.symbol] || h.avgCost;
        const mv = h.shares * px;
        const mvT = toTWD(mv, cur);
        const pnl = mv - h.totalCost;
        const pnlT = toTWD(pnl, cur);
        const pnlPct = h.totalCost > 0 ? pnl/h.totalCost : 0;
        const cls = pnlT >= 0 ? 'pos' : 'neg';
        return `<div class="holding-row" onclick="showHoldingDetail('${h.symbol}')">
          <div class="holding-mkt">${MKT_EMOJI[h.market]||'📊'}</div>
          <div class="holding-info">
            <div class="holding-sym">${h.symbol}</div>
            <div class="holding-name">${h.name}</div>
          </div>
          <div class="holding-right">
            <div class="holding-mv">NT$ ${FMT.num(mvT)}</div>
            <div class="holding-pnl ${cls}">${FMT.signed(pnlT)} (${FMT.pct(pnlPct)})</div>

      }).join('');

            <div class="tx-amt ${cls}">${FMT.signed(r.pnlTwd)}</div>

      }).join('');

        </div>
        <div class="cash-right">
          <div class="cash-amt ${r.flow==='IN'?'pos':'neg'}">${r.flow==='IN'?'+':'-'}${FMT.num(r.amount,2)}</div>
        </div>
      </div>`).join('');
    return `<div class="section-hdr">${acc.label}</div>
      <div class="card">
        <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
          <span style="color:var(--text2);font-size:12px;font-weight:700">結餘</span>
          <span style="font-size:20px;font-weight:800;color:var(--accent)">${FMT.num(bal, acc.cur==='TWD'?0:2)} <span style="font-size:12px;color:var(--text3)">${acc.cur}</span></span>
        </div>
        ${rowsHtml||'<div class="empty" style="padding:24px"><div class="msg">暫無記錄</div></div>'}
      </div>`;
  }).join('');
  document.getElementById('cashAccounts').innerHTML = html;
}

function renderRebal(d) {
  const prices = DB.get('prices') || {};
  const TW_REBAL = ['0050'];
  const GL_REBAL = ['2559','VTI','VXUS','VT','VWRA','AVGS'];
  let twT = 0, glT = 0;
  const symVal = {};
  for (const h of d.holdings) {
    const px = prices[h.symbol] || h.avgCost;
    const twd = toTWD(h.shares * px, h.currency);
    symVal[h.symbol] = { twd, shares:h.shares, price:px, currency:h.currency };
    if (TW_REBAL.includes(h.symbol)) twT += twd;
    if (GL_REBAL.includes(h.symbol)) glT += twd;
  }
  const t1 = twT + glT;
  const twP = t1 > 0 ? twT/t1 : 0;
  const glP = t1 > 0 ? glT/t1 : 0;
  const twD = t1*0.30 - twT;
  const glD = t1*0.70 - glT;
  const px0050 = prices['0050'] || (symVal['0050']?.price) || 0;
  const sh0050 = twD > 0 && px0050 > 0 ? Math.ceil(twD/px0050) : '—';

  // Tier 1
  const t1Html = `
    <div class="rebal-row">
      <div style="flex:1"><div class="rebal-name">🇹🇼 台股 (0050)</div><div class="rebal-sub">目標 30%</div></div>
      <div class="rebal-bar-wrap"><div class="rebal-bar" style="width:${Math.min(twP/0.3,1)*100}%;background:${twP>=0.28?'var(--green)':'var(--accent4)'}"></div></div>
      <div class="rebal-right">
        <div class="rebal-pct">${(twP*100).toFixed(1)}%</div>
        <div class="rebal-diff ${twD>0?'pos':'neg'}">${FMT.signed(twD/10000,1)}萬</div>
      </div>
    </div>
    <div class="rebal-row">
      <div style="flex:1"><div class="rebal-name">🌐 全球大盤</div><div class="rebal-sub">目標 70%</div></div>
      <div class="rebal-bar-wrap"><div class="rebal-bar" style="width:${Math.min(glP/0.7,1)*100}%;background:${glP>=0.65?'var(--green)':'var(--accent4)'}"></div></div>
      <div class="rebal-right">
        <div class="rebal-pct">${(glP*100).toFixed(1)}%</div>
        <div class="rebal-diff ${glD>0?'pos':'neg'}">${FMT.signed(glD/10000,1)}萬</div>
      </div>
    </div>
    ${twD > 500 ? `<div class="rebal-suggest">📈 建議買入 0050 約 ${sh0050} 股（差距 NT$ ${FMT.num(twD)}）</div>` : twD < -500 ? `<div class="rebal-suggest" style="color:var(--red);background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.2)">📉 0050 超配 NT$ ${FMT.num(Math.abs(twD))}</div>` : `<div class="rebal-suggest" style="color:var(--green);background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.2)">✅ 台股已平衡</div>`}
    <div style="padding:8px 16px;font-size:11px;color:var(--text3)">再平衡標的合計：NT$ ${FMT.num(t1)}</div>`;
  document.getElementById('rebalTier1').innerHTML = t1Html;

  // Tier 2
  const vwV = symVal['VWRA']?.twd || 0;
  const avV = symVal['AVGS']?.twd || 0;
  const t2 = vwV + avV;
  const vwP = t2>0 ? vwV/t2 : 0;
  const avP = t2>0 ? avV/t2 : 0;
  const vwD = t2*0.90 - vwV;
  const avD = t2*0.10 - avV;
  const pxVwra = prices['VWRA'] || 0;
  const pxAvgs = prices['AVGS'] || 0;
  const usdFx = getFx().USD || 31.92;
  const vwSh = vwD > 0 && pxVwra > 0 ? Math.ceil(vwD/(pxVwra*usdFx)) : '—';
  const avSh = avD > 0 && pxAvgs > 0 ? Math.ceil(avD/(pxAvgs*usdFx)) : '—';

  const t2Html = `
    <div class="rebal-row">
      <div style="flex:1"><div class="rebal-name">VWRA</div><div class="rebal-sub">目標 90%</div></div>
      <div class="rebal-bar-wrap"><div class="rebal-bar" style="width:${t2>0?Math.min(vwP/0.9,1)*100:0}%;background:var(--accent3)"></div></div>
      <div class="rebal-right">
        <div class="rebal-pct">${(vwP*100).toFixed(1)}%</div>
        <div class="rebal-diff ${vwD>0?'pos':'neg'}">${vwSh!=='—'?vwSh+'股':FMT.signed(vwD/10000,1)+'萬'}</div>
      </div>
    </div>
    <div class="rebal-row">
      <div style="flex:1"><div class="rebal-name">AVGS</div><div class="rebal-sub">目標 10%</div></div>
      <div class="rebal-bar-wrap"><div class="rebal-bar" style="width:${t2>0?Math.min(avP/0.1,1)*100:0}%;background:var(--accent4)"></div></div>
      <div class="rebal-right">
        <div class="rebal-pct">${(avP*100).toFixed(1)}%</div>
        <div class="rebal-diff ${avD>0?'pos':'neg'}">${avSh!=='—'?avSh+'股':FMT.signed(avD/10000,1)+'萬'}</div>
      </div>
    </div>
    <div style="padding:8px 16px;font-size:11px;color:var(--text3)">複委託合計：NT$ ${FMT.num(t2)}</div>`;
  document.getElementById('rebalTier2').innerHTML = t2Html;

  // 全球明細
  const glDetails = [
    { sym:'2559', label:'🇯🇵 2559 日股',    cur:'JPY' },
    { sym:'VTI',  label:'🇺🇸 VTI',          cur:'USD' },
    { sym:'VXUS', label:'🇺🇸 VXUS',         cur:'USD' },
    { sym:'VT',   label:'🇺🇸 VT',           cur:'USD' },
    { sym:'VWRA', label:'🇬🇧 VWRA',         cur:'USD' },
    { sym:'AVGS', label:'🇬🇧 AVGS',         cur:'USD' },
  ];
  const detailHtml = glDetails.map(gd => {
    const sv = symVal[gd.sym];
    const twd = sv?.twd || 0;
    const shs = sv?.shares || 0;
    const px  = sv?.price || prices[gd.sym] || 0;
    const glPct = glT > 0 ? twd/glT : 0;
    const targetTwd = glT / 6;
    const diffTwd = targetTwd - twd;
    const diffSh = px > 0 && Math.abs(diffTwd) > 100
      ? Math.round(diffTwd / toTWD(px, gd.cur))
      : 0;
    return `<div class="rebal-row">
      <div style="flex:1">
        <div class="rebal-name" style="font-size:12px">${gd.label}</div>
        <div class="rebal-sub">${shs>0?FMT.num(shs,4)+'股':'未持有'} · ${FMT.num(px,2)} ${gd.cur}</div>
      </div>
      <div class="rebal-right">
        <div class="rebal-pct" style="font-size:12px">${(glPct*100).toFixed(1)}%</div>
        <div class="rebal-diff ${diffSh>0?'pos':diffSh<0?'neg':''}" style="font-size:10px">${diffSh>0?'+'+diffSh+'股':diffSh<0?diffSh+'股':'✅'}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('rebalDetail').innerHTML = detailHtml;
}

function updateFxBar() {
  const fx = getFx();
  document.getElementById('fxUSD').textContent = fx.USD?.toFixed(3) || '—';
  document.getElementById('fxJPY').textContent = fx.JPY?.toFixed(4) || '—';
  document.getElementById('fxGBP').textContent = fx.GBP?.toFixed(3) || '—';
  const saved = DB.get('fxTime');
  document.getElementById('fxTime').textContent = saved || '—';
}

// ══════════════════════════════════════════════════════════
// 持倉詳情
// ══════════════════════════════════════════════════════════
function showHoldingDetail(symbol) {
  const { holdings } = computeFIFO();
  const h = holdings.find(x => x.symbol === symbol);
  if (!h) return;
  const prices = DB.get('prices') || {};
  const px = prices[h.symbol] || h.avgCost;
  const mv = h.shares * px;
  const mvT = toTWD(mv, h.currency);
  const pnl = mv - h.totalCost;
  const pnlT = toTWD(pnl, h.currency);
  const pnlPct = h.totalCost > 0 ? pnl/h.totalCost : 0;
  const cls = pnlT >= 0 ? 'pos' : 'neg';

  document.getElementById('holdingDetailContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div style="width:44px;height:44px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px">${MKT_EMOJI[h.market]}</div>
      <div>
        <div style="font-size:20px;font-weight:800">${h.symbol}</div>
        <div style="font-size:13px;color:var(--text3)">${h.name}</div>
      </div>
    </div>
    <div class="detail-row"><span class="detail-label">持股數</span><span class="detail-val">${FMT.num(h.shares, 4)}</span></div>
    <div class="detail-row"><span class="detail-label">平均成本</span><span class="detail-val">${FMT.num(h.avgCost, 4)} ${h.currency}</span></div>
    <div class="detail-row"><span class="detail-label">現價</span><span class="detail-val">${FMT.num(px, 4)} ${h.currency}</span></div>
    <div class="detail-row"><span class="detail-label">現價 (TWD)</span><span class="detail-val">NT$ ${FMT.num(toTWD(px, h.currency), 2)}</span></div>
    <div class="detail-row"><span class="detail-label">市值 (原幣)</span><span class="detail-val">${FMT.num(mv, 2)} ${h.currency}</span></div>
    <div class="detail-row"><span class="detail-label">市值 (TWD)</span><span class="detail-val">NT$ ${FMT.num(mvT)}</span></div>
    <div class="detail-row"><span class="detail-label">總成本 (原幣)</span><span class="detail-val">${FMT.num(h.totalCost, 2)} ${h.currency}</span></div>
    <div class="detail-row"><span class="detail-label">未實現損益</span><span class="detail-val ${cls}">${FMT.signed(pnlT)} (${FMT.pct(pnlPct)})</span></div>
    <div style="margin-top:16px">
      <label class="form-label">更新現價 (${h.currency})</label>
      <div style="display:flex;gap:8px">
        <input type="number" class="form-input" id="px-input" value="${px}" inputmode="decimal" style="flex:1">
        <button onclick="updatePrice('${h.symbol}')" style="padding:12px 16px;border-radius:12px;background:var(--accent);color:#000;font-weight:700;border:none;cursor:pointer">更新</button>
      </div>
    </div>`;
  openModal('holdingDetailModal');
}

function updatePrice(symbol) {
  const val = parseFloat(document.getElementById('px-input').value);
  if (!val || val <= 0) return;
  const prices = DB.get('prices') || {};
  prices[symbol] = val;
  DB.set('prices', prices);
  closeModal('holdingDetailModal');
  renderAll();
}

// ══════════════════════════════════════════════════════════
// 新增交易
// ══════════════════════════════════════════════════════════
let _action = 'BUY';
function setAction(a, el) {
  _action = a;
  document.querySelectorAll('#tradeModal .seg-btn').forEach(b => b.classList.remove('active','buy','sell'));
  el.classList.add('active', a.toLowerCase());
  updateTradeSummary();
}

let _cashFlow = 'IN';
function setCashFlow(f, el) {
  _cashFlow = f;
  document.querySelectorAll('#cashModal .seg-btn').forEach(b => b.classList.remove('active','in','out'));
  el.classList.add('active', f.toLowerCase());
}

function onMarketChange() {
  const m = document.getElementById('t-market').value;
  const sel = document.getElementById('t-symbol');
  const syms = DB.get('symbols') || getDefaultSymbols();
  const list = syms[m] || [];
  sel.innerHTML = list.map(s => `<option value="${s[0]}">${s[0]}${s[1]&&s[1]!==s[0]?' — '+s[1]:''}</option>`).join('');
  onSymbolChange();
  document.getElementById('t-dj-row').style.display = m === 'FUND' ? 'block' : 'none';
  document.getElementById('t-shares-label').textContent = m === 'FUND' ? '受益人數' : '股數';
}

function onSymbolChange() {
  const m = document.getElementById('t-market').value;
  const sym = document.getElementById('t-symbol').value;
  const syms = DB.get('symbols') || getDefaultSymbols();
  const list = syms[m] || [];
  const entry = list.find(s => s[0] === sym);
  if (entry) {
    document.getElementById('t-name').value = entry[1] || sym;
    if (entry[2]) document.getElementById('t-dj').value = entry[2];
  }
  updateTradeSummary();
}

function updateTradeSummary() {
  const price = parseFloat(document.getElementById('t-price').value) || 0;
  const shares = parseFloat(document.getElementById('t-shares').value) || 0;
  const fee = parseFloat(document.getElementById('t-fee').value) || 0;
  const m = document.getElementById('t-market').value;
  const cur = m === 'TW' || m === 'FUND' ? 'TWD' : m === 'JP' ? 'JPY' : 'USD';
  const box = document.getElementById('t-summary');
  if (!price || !shares) { box.style.display='none'; return; }
  const total = _action === 'BUY' ? price*shares+fee : price*shares-fee;
  box.style.display = 'block';
  box.innerHTML = `${_action==='BUY'?'買入':'賣出'} ${shares} × ${price} = <strong>${FMT.num(total,4)} ${cur}</strong>`;
}

function submitTrade() {
  const sym = document.getElementById('t-symbol').value;
  const name = document.getElementById('t-name').value;
  const market = document.getElementById('t-market').value;
  const date = document.getElementById('t-date').value;
  const price = parseFloat(document.getElementById('t-price').value);
  const shares = parseFloat(document.getElementById('t-shares').value);
  const fee = parseFloat(document.getElementById('t-fee').value) || 0;

  if (!sym || !date || !price || !shares || price <= 0 || shares <= 0) {
    alert('請填寫所有必填欄位'); return;
  }

  const trades = DB.get('trades') || [];
  trades.push({ id: Date.now(), symbol:sym, name, market, action:_action, date, price, shares, fee });
  DB.set('trades', trades);

  // 自動寫現金（截止日期前不計）
  const CUTOFF = '2026-03-26';
  if (date >= CUTOFF) {
    const amt = _action === 'BUY' ? -(price*shares + fee) : (price*shares - fee);
    const desc = `${_action==='BUY'?'買入':'賣出'} ${sym} × ${shares}`;
    let cashKey = 'CASH_US';
    if (market === 'TW' || market === 'FUND') cashKey = 'CASH_TW';
    else if (market === 'JP') cashKey = 'CASH_JP';
    else if (sym === 'VWRA' || sym === 'AVGS') cashKey = 'CASH_FX';
    addCashRow(cashKey, date, desc, amt < 0 ? 'OUT' : 'IN', Math.abs(amt));
  }

  closeModal('tradeModal');
  renderAll();
}

function submitCash() {
  const account = document.getElementById('c-account').value;
  const date = document.getElementById('c-date').value;
  const amount = parseFloat(document.getElementById('c-amount').value);
  const desc = document.getElementById('c-desc').value;
  if (!date || !amount || amount <= 0) { alert('請填寫所有必填欄位'); return; }
  addCashRow(account, date, desc, _cashFlow, amount);
  closeModal('cashModal');
  renderAll();
}

function addCashRow(account, date, desc, flow, amount) {
  const cash = DB.get('cash') || {};
  if (!cash[account]) cash[account] = [];
  cash[account].push({ id:Date.now(), date, desc, flow, amount });
  cash[account].sort((a,b) => a.date.localeCompare(b.date));
  DB.set('cash', cash);
}

// ══════════════════════════════════════════════════════════
// 匯率
// ══════════════════════════════════════════════════════════
function saveFx() {
  const usd = parseFloat(document.getElementById('fx-usd').value);
  const jpy = parseFloat(document.getElementById('fx-jpy').value);
  const gbp = parseFloat(document.getElementById('fx-gbp').value);
  if (!usd || !jpy || !gbp) { alert('請填寫所有匯率'); return; }
  DB.set('fx', { USD:usd, JPY:jpy, GBP:gbp });
  DB.set('fxTime', FMT.today());
  closeModal('fxModal');
  renderAll();
}

// ══════════════════════════════════════════════════════════
// 快照
// ══════════════════════════════════════════════════════════
function takeSnapshot() {
  const { total } = calcPortfolio();
  const snaps = DB.get('snapshots') || [];
  snaps.push({ date: FMT.today(), total });
  DB.set('snapshots', snaps);
  alert(`📸 快照：NT$ ${FMT.num(total)}`);
}

// ══════════════════════════════════════════════════════════
// UI 控制
// ══════════════════════════════════════════════════════════
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (el) el.classList.add('active');
  document.getElementById('fabBtn').style.display = id === 'cash' ? 'flex' : 'flex';
  // Re-render when switching to rebal/holdings
  if (id === 'rebal' || id === 'holdings') {
    const d = calcPortfolio();
    if (id === 'rebal') renderRebal(d);
    if (id === 'holdings') renderHoldings(d);
  }
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  // 關閉背景滾動
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// FAB 邏輯（當前頁面決定開哪個 modal）
document.getElementById('fabBtn').addEventListener('click', () => {
  const activePage = document.querySelector('.page.active').id;
  if (activePage === 'page-cash') {
    // 預設今天日期
    document.getElementById('c-date').value = FMT.today();
    openModal('cashModal');
  } else {
    // 預設今天日期、初始化代號
    document.getElementById('t-date').value = FMT.today();
    onMarketChange();
    openModal('tradeModal');
  }
});

document.getElementById('fxBtn').addEventListener('click', () => {
  const fx = getFx();
  document.getElementById('fx-usd').value = fx.USD;
  document.getElementById('fx-jpy').value = fx.JPY;
  document.getElementById('fx-gbp').value = fx.GBP;
  openModal('fxModal');
});

document.getElementById('snapshotBtn').addEventListener('click', takeSnapshot);

// 點背景關閉 modal
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

// ══════════════════════════════════════════════════════════
// 啟動
// ══════════════════════════════════════════════════════════
initData();
renderAll();
</script>
